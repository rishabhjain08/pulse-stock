name: Build & Deploy to Play Store Internal Track

# ── How to enable this workflow ────────────────────────────────────────────
# 1. Add a repository VARIABLE (not secret) to act as the on/off switch:
#      Settings → Secrets and variables → Actions → Variables tab
#      Name: ENABLE_PLAY_STORE_DEPLOY   Value: true
#
# 2. Add these repository SECRETS:
#      FINNHUB_API_KEY              Your Finnhub.io API key
#      GOOGLE_SERVICES_JSON         Contents of google-services.json from Firebase console
#      KEYSTORE_BASE64              base64-encoded release keystore (see README for keytool cmd)
#      KEYSTORE_PASSWORD            Keystore password
#      KEY_ALIAS                    Key alias (default: pulsestock)
#      KEY_PASSWORD                 Key password
#      PLAY_SERVICE_ACCOUNT_JSON    Google Play service account key JSON
#                                   (Play Console → Setup → API access → Create service account
#                                    → grant 'Release apps to testing tracks' +
#                                      'View app information (read-only)' permissions)
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build_deploy.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # Skips unless ENABLE_PLAY_STORE_DEPLOY variable is set to 'true'
    # Set it in: Settings → Secrets and variables → Actions → Variables tab
    if: vars.ENABLE_PLAY_STORE_DEPLOY == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      # Decode the base64-encoded keystore stored in GitHub Secrets
      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/pulsestock.keystore

      # Build a signed release AAB (Android App Bundle).
      # Play Store requires AAB over APK; bundleRelease produces app/build/outputs/bundle/release/app-release.aab
      - name: Build signed release AAB
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          KEYSTORE_PATH: ../keystore/pulsestock.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease --build-cache --parallel --no-daemon

      # Auto-increment versionCode using the GitHub run number so every upload
      # has a unique code (Play rejects duplicate versionCodes).
      - name: Set versionCode to run number
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
          echo "versionCode set to ${{ github.run_number }}"

      - name: Rebuild AAB with updated versionCode
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          KEYSTORE_PATH: ../keystore/pulsestock.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease --build-cache --parallel --no-daemon

      # Upload to Play Store internal testing track.
      # Requires PLAY_SERVICE_ACCOUNT_JSON secret (Play Console → Setup → API access).
      #
      # status: draft — required for a brand-new app that has never had a release.
      # After you manually promote the first release in Play Console
      # (Internal testing → promote release → rollout), change this to 'completed'
      # so future CI builds go live to testers automatically.
      - name: Publish to Play Store internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.pulsestock.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: draft
          releaseName: "Build ${{ github.run_number }}"
          whatsNewDirectory: distribution/whatsnew
