name: Build & Distribute via Firebase App Distribution

# ── How to enable this workflow ────────────────────────────────────────────
# Add these secrets in Settings → Secrets and variables → Actions:
#
#   FINNHUB_API_KEY              Your Finnhub.io API key
#   GOOGLE_SERVICES_JSON         Contents of google-services.json from Firebase console
#   FIREBASE_APP_ID              Firebase app ID  (format: 1:xxx:android:xxx)
#   FIREBASE_SERVICE_ACCOUNT_JSON  Firebase service account key JSON
#
# In Firebase Console → App Distribution → Testers & Groups:
#   Create a group named exactly "internal-testers" and add tester emails.
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/firebase_distribute.yml'
  workflow_dispatch:

concurrency:
  group: firebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Build debug APK
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: gradle assembleDebug --build-cache --parallel --no-daemon

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: internal-testers
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "Build ${{ github.run_number }} — ${{ github.event.head_commit.message }}"
          debug: true
