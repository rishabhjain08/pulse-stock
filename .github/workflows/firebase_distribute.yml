name: Build & Distribute via Firebase App Distribution

# ── How to enable this workflow ────────────────────────────────────────────
# 1. Add a repository VARIABLE (not secret) to act as the on/off switch:
#      Settings → Secrets and variables → Actions → Variables tab
#      Name: ENABLE_FIREBASE_DISTRIBUTION   Value: true
#
# 2. Add these repository SECRETS:
#      FINNHUB_API_KEY              Your Finnhub.io API key
#      GOOGLE_SERVICES_JSON         Contents of google-services.json from Firebase console
#      FIREBASE_APP_ID              Firebase app ID  (format: 1:xxx:android:xxx)
#      FIREBASE_SERVICE_ACCOUNT_JSON  Firebase service account key JSON
#
# 3. In Firebase Console → App Distribution → Testers & Groups:
#      Create a group named exactly "internal-testers" and add tester emails.
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/firebase_distribute.yml'
  workflow_dispatch:

concurrency:
  group: firebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    # Skips unless ENABLE_FIREBASE_DISTRIBUTION variable is set to 'true'
    # Set it in: Settings → Secrets and variables → Actions → Variables tab
    if: vars.ENABLE_FIREBASE_DISTRIBUTION == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Build debug APK
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: gradle assembleInternalDebug --build-cache --parallel --no-daemon

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: internal-testers
          file: app/build/outputs/apk/internalDebug/app-internal-debug.apk
          releaseNotes: "Build ${{ github.run_number }} — ${{ github.event.head_commit.message }}"
          debug: true
