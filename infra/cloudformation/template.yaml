AWSTemplateFormatVersion: '2010-09-09'
Description: >
  PoarVault — stateless Plaid proxy.
  5 Lambda functions behind an HTTP API Gateway.
  Stores NOTHING. All Plaid secrets live in SSM Parameter Store.
  Requires the poarvault-bootstrap stack to be deployed first.

Parameters:
  LambdaS3Key:
    Type: String
    Description: S3 key of the Lambda zip uploaded by deploy.sh (e.g. lambda-1234567890.zip)

Resources:

  # ── IAM ────────────────────────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: poarvault-lambda-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: poarvault-ssm-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/poarvault/*'

  # ── Lambda log groups (90-day retention) ───────────────────────────────────

  LogGroupLinkToken:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/poarvault-link-token
      RetentionInDays: 90

  LogGroupExchangeToken:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/poarvault-exchange-token
      RetentionInDays: 90

  LogGroupTransactions:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/poarvault-transactions
      RetentionInDays: 90

  LogGroupBalances:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/poarvault-balances
      RetentionInDays: 90

  LogGroupDisconnect:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/poarvault-disconnect
      RetentionInDays: 90

  # ── Lambda functions ────────────────────────────────────────────────────────

  LambdaLinkToken:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupLinkToken
    Properties:
      FunctionName: poarvault-link-token
      Runtime: nodejs20.x
      Handler: link-token.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 256
      Timeout: 10
      Code:
        S3Bucket: !ImportValue poarvault-artifact-bucket
        S3Key: !Ref LambdaS3Key

  LambdaExchangeToken:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupExchangeToken
    Properties:
      FunctionName: poarvault-exchange-token
      Runtime: nodejs20.x
      Handler: exchange-token.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 256
      Timeout: 10
      Code:
        S3Bucket: !ImportValue poarvault-artifact-bucket
        S3Key: !Ref LambdaS3Key

  LambdaTransactions:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupTransactions
    Properties:
      FunctionName: poarvault-transactions
      Runtime: nodejs20.x
      Handler: transactions.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 256
      Timeout: 30
      Code:
        S3Bucket: !ImportValue poarvault-artifact-bucket
        S3Key: !Ref LambdaS3Key

  LambdaBalances:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupBalances
    Properties:
      FunctionName: poarvault-balances
      Runtime: nodejs20.x
      Handler: balances.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 256
      Timeout: 15
      Code:
        S3Bucket: !ImportValue poarvault-artifact-bucket
        S3Key: !Ref LambdaS3Key

  LambdaDisconnect:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupDisconnect
    Properties:
      FunctionName: poarvault-disconnect
      Runtime: nodejs20.x
      Handler: disconnect.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 256
      Timeout: 10
      Code:
        S3Bucket: !ImportValue poarvault-artifact-bucket
        S3Key: !Ref LambdaS3Key

  # ── HTTP API Gateway ────────────────────────────────────────────────────────

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: poarvault-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type
          - x-api-key

  HttpApiDefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  # ── Lambda integrations ─────────────────────────────────────────────────────

  IntegrationLinkToken:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaLinkToken.Arn
      PayloadFormatVersion: '2.0'

  IntegrationExchangeToken:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaExchangeToken.Arn
      PayloadFormatVersion: '2.0'

  IntegrationTransactions:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaTransactions.Arn
      PayloadFormatVersion: '2.0'

  IntegrationBalances:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaBalances.Arn
      PayloadFormatVersion: '2.0'

  IntegrationDisconnect:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaDisconnect.Arn
      PayloadFormatVersion: '2.0'

  # ── Routes ──────────────────────────────────────────────────────────────────

  RouteLinkToken:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /link-token
      Target: !Sub 'integrations/${IntegrationLinkToken}'

  RouteExchangeToken:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /exchange-token
      Target: !Sub 'integrations/${IntegrationExchangeToken}'

  RouteTransactions:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /transactions
      Target: !Sub 'integrations/${IntegrationTransactions}'

  RouteBalances:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /balances
      Target: !Sub 'integrations/${IntegrationBalances}'

  RouteDisconnect:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /disconnect
      Target: !Sub 'integrations/${IntegrationDisconnect}'

  # ── Lambda invoke permissions for API Gateway ───────────────────────────────

  InvokePermissionLinkToken:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaLinkToken.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  InvokePermissionExchangeToken:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaExchangeToken.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  InvokePermissionTransactions:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaTransactions.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  InvokePermissionBalances:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaBalances.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  InvokePermissionDisconnect:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaDisconnect.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

Outputs:
  ApiUrl:
    Description: PoarVault API base URL — add to local.properties as POARVAULT_API_URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: poarvault-api-url
